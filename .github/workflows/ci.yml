name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:

  php-lint:
    name: Vérification syntaxe PHP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Vérifier la syntaxe de tous les fichiers .php
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -print0 | xargs -0 -n1 php -l

  docker-build:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image à partir du Dockerfile
        run: docker build -t arene-automobile:ci .

  jest-tests:
    name: Tests unitaires (Jest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances npm
        run: npm ci

      - name: Lancer les tests Jest
        run: npm test